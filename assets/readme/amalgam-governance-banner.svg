<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="100%">
    <defs>
        <!-- Dark radial gradient for background visual depth -->
        <radialGradient id="bg-grad" cx="50%" cy="40%" r="60%" fx="50%" fy="30%">
            <stop offset="0%" stop-color="#181818" />
            <stop offset="60%" stop-color="#0a0a0a" />
            <stop offset="100%" stop-color="#020202" />
        </radialGradient>
        
        <!-- Premium Gold Linear Gradient -->
        <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#9a7a35" />
            <stop offset="25%" stop-color="#caa75a" />
            <stop offset="50%" stop-color="#fdf0cd" />
            <stop offset="75%" stop-color="#caa75a" />
            <stop offset="100%" stop-color="#9a7a35" />
        </linearGradient>

        <!-- Waving Gold Gradient -->
        <linearGradient id="gold-wave-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#bf953f" stop-opacity="0.08" />
            <stop offset="50%" stop-color="#fcf6ba" stop-opacity="0.18" />
            <stop offset="100%" stop-color="#b38728" stop-opacity="0.03" />
        </linearGradient>

        <linearGradient id="wave-border" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#9a7a35" />
            <stop offset="50%" stop-color="#fdf0cd" />
            <stop offset="100%" stop-color="#9a7a35" />
        </linearGradient>

        <!-- Dynamic drop shadow for text -->
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.85" />
        </filter>
        
        <style>
            .title {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                font-weight: 800;
                font-size: 52px;
                fill: url(#gold-grad);
                text-anchor: middle;
                letter-spacing: 5px;
                filter: url(#shadow);
            }
            .subtitle {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                font-weight: 400;
                font-size: 18px;
                fill: #cccccc;
                text-anchor: middle;
                letter-spacing: 2px;
                opacity: 0.95;
                filter: url(#shadow);
            }
            .wave {
                animation: flow 18s infinite linear;
            }
            @keyframes flow {
                0% { transform: translateX(0); }
                100% { transform: translateX(-1000px); }
            }
        </style>
    </defs>
    
    <!-- Deep dark background -->
    <rect width="1000" height="250" fill="url(#bg-grad)" />

    <!-- Subtle Golden Tech Rings/Orchestration circles -->
    <circle cx="500" cy="-30" r="220" fill="none" stroke="url(#gold-grad)" stroke-width="0.5" opacity="0.12" />
    <circle cx="500" cy="-30" r="260" fill="none" stroke="url(#gold-grad)" stroke-dasharray="6,4" stroke-width="0.75" opacity="0.08" />
    <circle cx="500" cy="-30" r="300" fill="none" stroke="url(#gold-grad)" stroke-width="0.5" opacity="0.04" />

    <!-- Animated Waving Shapes at the bottom -->
    <g class="wave">
        <!-- Wave 1 (Back) -->
        <path d="M0,250 L0,210 Q125,170 250,210 T500,210 T750,210 T1000,210 L1000,250 Z" fill="url(#gold-wave-grad)" opacity="0.4" />
        <path d="M1000,250 L1000,210 Q1125,170 1250,210 T1500,210 T1750,210 T2000,210 L2000,250 Z" fill="url(#gold-wave-grad)" opacity="0.4" />

        <!-- Wave 2 (Middle) -->
        <path d="M0,250 L0,220 Q125,185 250,220 T500,220 T750,220 T1000,220 L1000,250 Z" fill="url(#gold-wave-grad)" opacity="0.6" />
        <path d="M1000,250 L1000,220 Q1125,185 1250,220 T1500,220 T1750,220 T2000,220 L2000,250 Z" fill="url(#gold-wave-grad)" opacity="0.6" />

        <!-- Wave 3 (Front solid gilded edge) -->
        <path d="M0,250 L0,230 Q125,200 250,230 T500,230 T750,230 T1000,230 L1000,250 Z" fill="url(#gold-wave-grad)" opacity="0.8" />
        <path d="M1000,250 L1000,230 Q1125,200 1250,230 T1500,230 T1750,230 T2000,230 L2000,250 Z" fill="url(#gold-wave-grad)" opacity="0.8" />

        <!-- Highlight line on top of front wave -->
        <path d="M0,230 Q125,200 250,230 T500,230 T750,230 T1000,230" fill="none" stroke="url(#wave-border)" stroke-width="1.25" opacity="0.85" />
        <path d="M1000,230 Q1125,200 1250,230 T1500,230 T1750,230 T2000,230" fill="none" stroke="url(#wave-border)" stroke-width="1.25" opacity="0.85" />
    </g>

    <!-- Content / Typography -->
    <text x="500" y="110" class="title">Amalgam Conductor</text>
    <text x="500" y="150" class="subtitle">Governance-first orchestration for AI-assisted development</text>
</svg>
